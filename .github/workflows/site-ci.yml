name: Site CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check critical files exist
        run: |
          test -f index.html || (echo "Missing index.html" && exit 1)
          test -f CNAME || (echo "Missing CNAME" && exit 1)
          echo "All critical files present."

      - name: Validate HTML structure
        run: |
          # Check that index.html has basic required elements
          grep -q '<!DOCTYPE html>' index.html || (echo "Missing DOCTYPE in index.html" && exit 1)
          grep -q '<html' index.html || (echo "Missing html tag in index.html" && exit 1)
          grep -q '</html>' index.html || (echo "Missing closing html tag in index.html" && exit 1)
          grep -q '<head>' index.html || (echo "Missing head tag in index.html" && exit 1)
          grep -q '</head>' index.html || (echo "Missing closing head tag in index.html" && exit 1)
          grep -q '<body>' index.html || (echo "Missing body tag in index.html" && exit 1)
          grep -q '</body>' index.html || (echo "Missing closing body tag in index.html" && exit 1)
          echo "HTML structure valid."

      - name: Install dependencies and build
        run: |
          cd portfolio-v2
          npm ci
          npm run build

      - name: Link check (external)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress
            --accept 200,204,206,301,302,303,307,308,999
            --retry-wait-time 2 --max-retries 2 --timeout 15
            --exclude '^https://ahmed-raza-ur-rehman\.me/.*'
            --exclude '^https://github-profile-trophy\.vercel\.app/.*'
            --exclude '^https://(www\.)?linkedin\.com/.*'
            'index.html' '*.md'
          fail: true

      - name: Upload CI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-ci-report
          path: .lycheeout
          if-no-files-found: ignore
